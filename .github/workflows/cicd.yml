name: CI/CD

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/chatbot:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/chatbot:${{ github.sha }}
  deploy:
        needs: build-and-push      
        runs-on: ubuntu-latest
        steps:
          - name: Checkout Code
            uses: actions/checkout@v4

          - name: Spin up a throwaway cluster inside the runner
            uses: helm/kind-action@v1.14.0 

          - name: Deploy and Verify Rollout
            run: |
              
              kubectl apply -f k8s/
              
              
              kubectl set image deployment/clinical-rag-deployment \
                clinical-rag=${{ secrets.DOCKERHUB_USERNAME }}/clinical-rag-analyser:${{ github.sha }}
              
              
              kubectl rollout status deployment/clinical-rag-deployment
